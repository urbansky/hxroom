server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Pre-Launch: Suchmaschinen komplett fernhalten. Entfernen, sobald HxRoom öffentlich indiziert werden soll.
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        # add_header ersetzt die geerbten Server-Header – deshalb X-Robots-Tag hier erneut setzen.
        add_header Cache-Control "public, immutable" always;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    }
}
