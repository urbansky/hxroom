# HxRoom – Docker Compose (Lokale Entwicklung)
# Startet PostgreSQL, Redis, LiveKit (dev), Whisper-Service.
# Weitere Services werden in späteren Phasen ergänzt.
services:
  caddy:
    build: ./caddy
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
