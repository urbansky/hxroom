# HxRoom – Docker Compose (Produktion)
# Images werden von GitHub Actions gebaut und auf ghcr.io gepusht.
# Auf Hetzner: docker compose pull && docker compose up -d
services:
  caddy:
    build: ./caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/data:/data
      - ./caddy/config:/config
    environment:
      - IONOS_API_TOKEN=${IONOS_API_TOKEN}
    depends_on:
      - landing
      - room
    restart: unless-stopped

  landing:
    image: ghcr.io/urbansky/hxroom/landing:latest
    build:
      context: ..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped

  room:
    image: ghcr.io/urbansky/hxroom/room:latest
    build:
      context: ..
      dockerfile: apps/room/Dockerfile
    restart: unless-stopped

