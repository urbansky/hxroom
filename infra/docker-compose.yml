# HxRoom – Docker Compose (Produktion)
# Images werden von GitHub Actions gebaut und auf ghcr.io gepusht.
# Auf Hetzner: docker compose pull && docker compose up -d
services:
  caddy:
    build: ./caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/data:/data
      - ./caddy/config:/config
    environment:
      - IONOS_API_TOKEN=${IONOS_API_TOKEN}
    depends_on:
      - landing
      - coach
      - room
      - api
    restart: unless-stopped

  landing:
    image: ghcr.io/urbansky/hxroom/landing:latest
    build:
      context: ..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped

  coach:
    image: ghcr.io/urbansky/hxroom/coach:latest
    build:
      context: ..
      dockerfile: apps/coach/Dockerfile
    restart: unless-stopped

  room:
    image: ghcr.io/urbansky/hxroom/room:latest
    build:
      context: ..
      dockerfile: apps/room/Dockerfile
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    image: ghcr.io/urbansky/hxroom/api:latest
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Spätere Phasen ergänzen u.a.:
      # - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      # - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      # - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      # - S3_ENDPOINT=${S3_ENDPOINT}
      # - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      # - S3_SECRET_KEY=${S3_SECRET_KEY}
      # - BREVO_API_KEY=${BREVO_API_KEY}
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
