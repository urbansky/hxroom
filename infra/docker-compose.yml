# HxRoom – Docker Compose (Produktion)
# Siehe doc/technical.md Abschnitt 4 für die geplante Architektur.
services:
  caddy:
    build: ./caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - IONOS_API_TOKEN=${IONOS_API_TOKEN}
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
