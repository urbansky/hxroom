# HxRoom – Docker Compose (Produktion)
# Images werden von GitHub Actions gebaut und auf ghcr.io gepusht.
# Auf Hetzner: docker compose pull && docker compose up -d
services:
  caddy:
    build: ./caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - IONOS_API_TOKEN=${IONOS_API_TOKEN}
    depends_on:
      - landing
      - client
    restart: unless-stopped

  landing:
    image: ghcr.io/hxroom/hxroom/landing:latest
    build:
      context: ..
      dockerfile: apps/landing/Dockerfile
    restart: unless-stopped

  client:
    image: ghcr.io/hxroom/hxroom/client:latest
    build:
      context: ..
      dockerfile: apps/client/Dockerfile
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
